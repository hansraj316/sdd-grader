      - generic [ref=f1e34]:
        - paragraph [ref=f1e35]: Why this exists
        - heading "AI writes your specs now. Nothing checks them." [level=2] [ref=f1e36]
        - paragraph [ref=f1e37]:
          - text: "Spec-Kit and OpenSpec made the spec the source of truth: agents plan and build directly from it. But a plausible spec is not a buildable one — unresolved clarifications, untestable stories, quietly contradictory plans, and template boilerplate all flow straight into code generation. Code gets review, tests, and CI."
          - strong [ref=f1e38]: The document that generates the code gets nothing.
          - text: SDD-Grader is that missing check.
