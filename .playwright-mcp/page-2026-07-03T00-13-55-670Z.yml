          - paragraph [ref=f1e89]:
            - strong [ref=f1e90]: Lint-only
            - text: means no known deterministic findings — required sections present, traceability intact, no lexical pitfalls. It is not a semantic guarantee, and the report says so on every run.
          - paragraph [ref=f1e91]:
            - strong [ref=f1e92]: Lint + semantic
            - text: "adds the judge's reading: real ambiguity, contradictions across artifacts, over-engineering. Judges are language models — scores near your CI threshold carry noise, and the tool warns you when a run lands inside that band."
