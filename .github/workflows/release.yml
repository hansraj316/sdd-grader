name: Release

# Cut a release by pushing a tag:
#   git tag v0.2.0 && git push origin v0.2.0
#
# Pipeline: tests -> build (wheel + sdist, tag/version guard) -> GitHub Release
# with artifacts attached -> PyPI publish (separate, allowed-to-fail job).
# See docs/release.md for the full release procedure and the one-time PyPI
# Trusted Publisher setup.

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Create venv (Python 3.11)
        run: uv venv --python 3.11

      - name: Install (editable + dev)
        run: uv pip install -e ".[dev]"

      - name: Tests
        run: uv run pytest -q

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Check tag matches pyproject version
        run: |
          version="$(uv run --no-project python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          if [ "v${version}" != "${GITHUB_REF_NAME}" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match pyproject.toml version ${version}." \
                 "Bump [project].version and re-tag."
            exit 1
          fi

      - name: Build wheel + sdist
        run: uv build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  github-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release and attach artifacts
    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Create GitHub Release with artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes

  # PyPI publishing via trusted publishing (OIDC — no API token stored in the repo).
  #
  # REQUIRES ONE-TIME SETUP by the repo owner: a "Trusted Publisher" for the
  # `sddgrade` project must be configured on pypi.org pointing at this repo,
  # this workflow file (release.yml), and the `pypi` environment.
  # Exact steps: docs/release.md ("PyPI Trusted Publisher setup").
  #
  # Design choice: this is a SEPARATE job with continue-on-error so that, until
  # that setup is done, the tag still produces a green release pipeline and a
  # GitHub Release with installable artifacts — only this job shows as failed.
  # Once the Trusted Publisher exists, it starts publishing with no workflow change.
  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    continue-on-error: true # allowed to fail until the PyPI Trusted Publisher is configured
    environment: pypi
    permissions:
      id-token: write # OIDC token for PyPI trusted publishing
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
