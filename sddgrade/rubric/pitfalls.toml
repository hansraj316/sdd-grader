# SDD anti-pattern catalog. Grounded in research/PITFALLS.md.
#
# Each [[pitfall]] entry:
#   id            stable identifier (findings + history reference this)
#   name          short human label
#   dimension     scoring dimension it counts against
#   artifacts     artifact types it applies to
#   severity      info | low | medium | high | critical
#   method        lint | judge | both  (who can detect it)
#   why           why it hurts (downstream impact)
#   detect        how a reviewer detects it
#   fix           how to fix it
#   patterns      (optional) regex fragments for generic lexical lint checks
#
# `method = "lint"` / `"both"` entries are detected by the deterministic engine
# (generic `patterns` checks, or a dedicated check keyed by `id`). The full catalog
# is also handed to the LLM judge as guidance, which owns `method = "judge"`.

# ----------------------------------------------------------------------------- spec

[[pitfall]]
id = "SPEC-UNRESOLVED-CLARIFICATION"
name = "Unresolved [NEEDS CLARIFICATION] markers"
dimension = "completeness"
artifacts = ["spec", "plan"]
severity = "high"
method = "lint"
why = "Spec-Kit's own marker for an unanswered question. Left in, the agent guesses, and the code implements a guess instead of the requirement."
detect = "Count remaining `[NEEDS CLARIFICATION...]` markers in the artifact."
fix = "Resolve each marker (run /speckit.clarify) and replace it with a concrete decision; remove the marker."

[[pitfall]]
id = "SPEC-LEFTOVER-PLACEHOLDER"
name = "Unfilled template placeholders / TODO / TBD"
dimension = "completeness"
artifacts = ["spec", "plan", "tasks", "constitution"]
severity = "high"
method = "lint"
why = "Placeholders mean the section was never authored; the artifact is a half-filled template, not a specification."
detect = "Match leftover template tokens and stubs (an ellipsis only counts when it is the whole line or an empty field value, not a benign trailing '...' in prose)."
fix = "Fill in every placeholder with real content; delete sections that genuinely do not apply."
patterns = [
  "\\bTODO\\b", "\\bTBD\\b", "\\bFIXME\\b", "\\bXXX\\b",
  "\\[FEATURE NAME\\]", "\\[PROJECT_NAME\\]", "\\[PRINCIPLE_\\d", "\\[DATE\\]",
  "\\$ARGUMENTS", "\\[Brief Title\\]", "\\[Entity \\d\\]", "\\[REMOVE IF UNUSED\\]",
  "\\bplaceholder\\b", "<placeholder>",
  "^\\s*(?:[-*+]\\s+)?(?:\\.{3,}|…)\\s*$",
  ":\\*{0,2}\\s*(?:\\.{3,}|…)\\s*$",
]

[[pitfall]]
id = "SPEC-AMBIGUOUS-WORDING"
name = "Ambiguous / subjective wording"
dimension = "clarity"
artifacts = ["spec", "plan"]
severity = "medium"
method = "both"
why = "ISO/IEC/IEEE 29148 requires requirements be unambiguous — interpretable in only one way. Vague terms let the implementation diverge from intent (a 'Requirements Smell')."
detect = "Flag subjective/vague terms that have no objective meaning in a requirement."
fix = "Replace each vague term with a concrete, measurable condition (a number, a unit, an enumerated case)."
patterns = [
  "\\bfast\\b", "\\bslow\\b", "\\bquick(ly)?\\b", "\\beasy\\b", "\\bsimple\\b",
  "\\buser-?friendly\\b", "\\bintuitive\\b", "\\brobust\\b", "\\bscalable\\b",
  "\\bseamless(ly)?\\b", "\\befficient(ly)?\\b", "\\bappropriate(ly)?\\b",
  "\\bas needed\\b", "\\bas required\\b", "\\bif possible\\b", "\\bsome\\b",
  "\\bminimal\\b", "\\bmodern\\b", "\\bsufficient(ly)?\\b", "\\betc\\.",
]

[[pitfall]]
id = "SPEC-COMPARATIVE-NO-REFERENCE"
name = "Comparative without a reference point"
dimension = "clarity"
artifacts = ["spec"]
severity = "medium"
method = "both"
why = "A comparative ('faster', 'more secure') with no baseline is unverifiable — you can't test against an unstated reference (a 'Requirements Smell')."
detect = "Flag comparatives that lack an explicit baseline or threshold."
fix = "State the baseline and target ('p95 latency < 200ms', 'faster than the current 3s import')."
patterns = [
  "\\bfaster\\b", "\\bslower\\b", "\\bbetter\\b", "\\bworse\\b",
  "\\bmore (secure|reliable|performant|responsive)\\b", "\\bas (fast|quick) as possible\\b",
]

[[pitfall]]
id = "SPEC-IMPL-DETAIL-LEAK"
name = "Implementation / tech-stack detail in the spec"
dimension = "clarity"
artifacts = ["spec"]
severity = "medium"
method = "both"
why = "Spec-Kit requires specs be technology-agnostic (WHAT not HOW). Tech detail in the spec over-constrains design and confuses the boundary with plan.md."
detect = "Flag concrete tech-stack tokens (languages, frameworks, datastores, protocols) appearing in spec.md."
fix = "Move technology choices to plan.md; keep the spec about user needs and behavior."
patterns = [
  "\\bReact\\b", "\\bVue\\b", "\\bAngular\\b", "\\bPostgres(QL)?\\b", "\\bMySQL\\b",
  "\\bMongoDB\\b", "\\bRedis\\b", "\\bKafka\\b", "\\bDocker\\b", "\\bKubernetes\\b",
  "\\bGraphQL\\b", "\\bgRPC\\b", "\\bPython\\b", "\\bTypeScript\\b", "\\bJava\\b",
  "\\bREST API\\b", "\\bmicroservice", "\\bDjango\\b", "\\bFastAPI\\b", "\\bnpm\\b",
]

[[pitfall]]
id = "SPEC-NON-MEASURABLE-SUCCESS"
name = "Non-measurable success criteria"
dimension = "testability"
artifacts = ["spec"]
severity = "high"
method = "both"
why = "29148 requires requirements be verifiable/measurable. Success Criteria with no number or unit can't tell you whether the feature succeeded."
detect = "Success Criteria / Measurable Outcomes section contains no quantities, units, or thresholds."
fix = "Express each outcome as a measurable metric with a target value and unit."

[[pitfall]]
id = "SPEC-MISSING-ACCEPTANCE"
name = "User story without acceptance criteria"
dimension = "testability"
artifacts = ["spec"]
severity = "high"
method = "both"
why = "INVEST 'Testable': a story with no conditions of satisfaction can't be verified, so generated tests are guesses."
detect = "A user-story section with no acceptance criteria / Given-When-Then scenario."
fix = "Add explicit acceptance criteria per story, ideally Gherkin Given/When/Then."

[[pitfall]]
id = "SPEC-GHERKIN-MALFORMED-AC"
name = "Malformed Gherkin acceptance criteria (incomplete Given/When/Then triad)"
dimension = "testability"
artifacts = ["spec"]
severity = "medium"
method = "lint"
why = "Gherkin BDD / INVEST 'Testable': a scenario with Given/When but no Then specifies no expected outcome and cannot be turned into a passing test. A Then with no When/Given has no trigger or precondition. Partial Gherkin gives false confidence while remaining unexecutable."
detect = "Acceptance/scenario text for a user story has at least one line-leading Gherkin keyword (Given/When/Then) but is missing at least one of the required triad."
fix = "Complete the Gherkin triad: Given <precondition> / When <trigger> / Then <expected outcome>. Each scenario must include all three steps."

[[pitfall]]
id = "SPEC-NON-INDEPENDENT-STORY"
name = "User stories not independently testable"
dimension = "traceability"
artifacts = ["spec"]
severity = "medium"
method = "judge"
why = "INVEST 'Independent/Small': tangled or oversized stories can't be delivered as standalone MVP slices, breaking incremental delivery."
detect = "Stories that depend on each other or bundle many capabilities (judge)."
fix = "Split into thin vertical slices, each independently deliverable and testable."

[[pitfall]]
id = "SPEC-SPECULATIVE-FEATURE"
name = "Speculative / future-proofing requirement"
dimension = "feasibility"
artifacts = ["spec", "plan"]
severity = "low"
method = "both"
why = "Spec-Kit's methodology calls out speculative 'might need' features and unjustified future-proofing as anti-patterns that inflate scope."
detect = "Flag speculative hedging language not tied to a concrete user story."
fix = "Remove speculative items, or convert to a concrete, justified requirement with a user story."
patterns = [
  "\\bmight need\\b", "\\bnice to have\\b", "\\bin the future\\b", "\\bfuture-?proof",
  "\\beventually\\b", "\\bmay want to\\b", "\\bcould potentially\\b", "\\bdown the road\\b",
]

[[pitfall]]
id = "SPEC-STORY-NO-BENEFIT"
name = "User story missing 'so that [benefit]' clause"
dimension = "completeness"
artifacts = ["spec"]
severity = "low"
method = "lint"
why = "The Connextra story format requires role + goal + benefit. The 'so that' clause is the only part that encodes business value; without it, teams cannot evaluate trade-offs or confirm the story delivers anything worthwhile. Violates INVEST's Valuable principle and ISO 29148 §5.2.5 (each requirement shall state its rationale)."
detect = "A line matching 'As a(n) <role>, I want <goal>' with no 'so that' on the same or following non-blank line."
fix = "Append ', so that <benefit>' to complete the Connextra format and record the business value."

[[pitfall]]
id = "REQ-UNBOUNDED-SCOPE"
name = "Open-ended enumeration makes scope impossible to bound"
dimension = "completeness"
artifacts = ["spec", "plan"]
severity = "low"
method = "lint"
why = "ISO 29148 §5.2.5 mandates requirements be complete — an open-ended enumeration ('etc.', 'and so on') makes acceptance testing undefined and silently expands scope. QVscribe lists unbounded enumerations as a primary Completeness failure and a source of scope creep."
detect = "Requirement line (shall/must/should/will/want or FR-/NFR- label) containing an open-ended enumeration marker: 'etc.', 'and so on', 'and others', 'and more', 'including but not limited to', 'or similar'."
fix = "Replace the open-ended list with a complete, bounded enumeration. If the full list cannot be stated, define a clear inclusion rule or reference a schema rather than trailing off."

[[pitfall]]
id = "SPEC-MISSING-EDGE-CASES"
name = "Missing edge cases / error scenarios"
dimension = "completeness"
artifacts = ["spec"]
severity = "medium"
method = "lint"
why = "Without boundary and error scenarios, the implementation handles only the happy path; 29148 'complete'."
detect = "Edge Cases section is absent, empty, or only a placeholder."
fix = "Enumerate boundary conditions and error scenarios with expected behavior."

[[pitfall]]
id = "SPEC-NFR-NO-THRESHOLD"
name = "Non-functional requirement without a measurable threshold"
dimension = "testability"
artifacts = ["spec", "plan"]
severity = "medium"
method = "both"
why = "29148 'verifiable': an NFR like 'fast' or 'highly available' with no number can't be tested or accepted, so the implementation has no target to hit."
detect = "A requirement line about performance/latency/throughput/availability/scalability with no numeric threshold."
fix = "State the metric and target, e.g. 'p95 latency < 200ms' or '99.9% monthly uptime'."

[[pitfall]]
id = "SPEC-PASSIVE-VOICE"
name = "Passive voice / no clear actor in requirement"
dimension = "clarity"
artifacts = ["spec", "plan"]
severity = "medium"
method = "both"
why = "IBM RQA / INCOSE: passive, actorless requirements are ambiguous about who does what. ISO/IEC/IEEE 29148 'unambiguous': every requirement must identify the subject responsible for the action."
detect = "Requirement line (shall/must/should or FR-/NFR- label) that uses passive voice (auxiliary 'be' + past participle, or 'to be' + past participle) with no identifiable actor before the verb."
fix = "Rewrite in active voice with an explicit subject: 'The system shall [action]' rather than '[thing] shall be [past-participle by actor]'."

[[pitfall]]
id = "SPEC-ESCAPE-CLAUSE"
name = "Escape / loophole clause in requirement"
dimension = "testability"
artifacts = ["spec", "plan"]
severity = "medium"
method = "both"
why = "IBM RQA / Requirements Smells: escape clauses ('where feasible', 'to the extent practical', 'best effort') let the implementation opt out of the requirement, making it unverifiable and unenforceable."
detect = "Requirement line containing a hedge that qualifies the obligation — phrases that allow non-compliance without breach."
fix = "Replace escape clauses with a concrete, verifiable commitment. If exceptions are genuinely needed, enumerate them explicitly rather than using an open-ended escape."
patterns = [
  "\\bwhere feasible\\b",
  "\\bwhere practicable\\b",
  "\\bwhere possible\\b",
  "\\bto the extent practical\\b",
  "\\bto the extent possible\\b",
  "\\bas far as possible\\b",
  "\\bif applicable\\b",
  "\\bwhen applicable\\b",
  "\\bat the discretion\\b",
  "\\bbest effort\\b",
  "\\breasonable effort\\b",
]

[[pitfall]]
id = "SPEC-NEGATIVE-REQUIREMENT"
name = "Negative requirement (shall not / must not)"
dimension = "testability"
artifacts = ["spec", "plan"]
severity = "low"
method = "both"
why = "IBM RQA: negative requirements ('the system shall not X') are difficult to verify exhaustively — you cannot test all the things it must not do. 29148 'verifiable': requirements should be stated positively with bounded, testable conditions."
detect = "Requirement line (shall/must/should/will … not, or FR-/NFR- label) that states what the system must NOT do rather than what it must do."
fix = "Restate as a positive, bounded requirement. Instead of 'the system shall not expose PII', write 'the system shall encrypt all PII fields at rest with AES-256 and strip PII from logs'."

[[pitfall]]
id = "SPEC-UNCLEAR-ACTOR"
name = "Unclear actor / missing subject in requirement"
dimension = "clarity"
artifacts = ["spec", "plan"]
severity = "low"
method = "both"
why = "IBM RQA / ISO 29148 'unambiguous': a requirement with no identifiable actor cannot be traced to a responsible component. Pronoun subjects ('it shall', 'they must') or subjectless lines are untraceable."
detect = "Requirement line (shall/must/should/will or FR-/NFR- label) whose grammatical subject before the modal verb is a vague pronoun (it, they, this, that, these, those) or is entirely absent (line starts with the modal)."
fix = "Replace the pronoun with an explicit named actor: 'The system shall', 'The API gateway shall', 'The background worker shall'."

[[pitfall]]
id = "REQ-COMPOUND"
name = "Compound requirement (not singular)"
dimension = "clarity"
artifacts = ["spec"]
severity = "low"
method = "both"
why = "29148 'singular': a requirement bundling several capabilities can't be tested or traced cleanly and is partially satisfiable."
detect = "Requirement lines joining multiple capabilities with 'and'/'or'/';' (judge confirms)."
fix = "Split into one requirement per capability."

# ----------------------------------------------------------------------------- plan

[[pitfall]]
id = "PLAN-CONSTITUTION-UNCHECKED"
name = "Constitution Check missing or not passed"
dimension = "constitutional"
artifacts = ["plan"]
severity = "high"
method = "lint"
why = "The Constitution Check is a mandatory Spec-Kit gate before Phase 0. If absent or unaddressed, architectural principles aren't enforced."
detect = "No 'Constitution Check' section, or it isn't marked as passing."
fix = "Add the Constitution Check, evaluate each principle/gate, and mark pass/fail explicitly."

[[pitfall]]
id = "PLAN-UNJUSTIFIED-COMPLEXITY"
name = "Constitution violation without justification"
dimension = "constitutional"
artifacts = ["plan"]
severity = "high"
method = "both"
why = "Spec-Kit requires any gate violation be justified in Complexity Tracking; unjustified complexity is exactly the over-engineering the gates exist to stop."
detect = "Constitution Check shows a violation/FAIL but Complexity Tracking is empty or a placeholder."
fix = "Either remove the complexity, or document a concrete justification and the simpler alternative rejected."

[[pitfall]]
id = "PLAN-OVER-ENGINEERING"
name = "Over-engineering / unnecessary abstraction"
dimension = "feasibility"
artifacts = ["plan"]
severity = "medium"
method = "judge"
why = "Methodology anti-pattern: extra projects, wrapper layers, and abstractions beyond the need raise cost and risk with no user value."
detect = "Speculative abstraction layers, wrappers around frameworks, or excess projects (judge)."
fix = "Use the framework directly; collapse layers; justify any remaining complexity in Complexity Tracking."

[[pitfall]]
id = "PLAN-NO-RATIONALE"
name = "Technical choice without rationale"
dimension = "traceability"
artifacts = ["plan"]
severity = "medium"
method = "judge"
why = "SDD requires every technology choice trace to a requirement with documented rationale; undocumented choices can't be evaluated or revisited."
detect = "Technical Context choices stated without a 'why' tied to a requirement (judge)."
fix = "Add a one-line rationale per choice linking it to the requirement it serves."

# ----------------------------------------------------------------------------- tasks

[[pitfall]]
id = "TASKS-TESTS-NOT-FIRST"
name = "Implementation tasks before tests"
dimension = "constitutional"
artifacts = ["tasks"]
severity = "medium"
method = "lint"
why = "Test-First is a core SDD/constitutional imperative; implementation-before-test tasks invert it and erode the safety net."
detect = "Within a user story, implementation tasks appear with no preceding test tasks."
fix = "Order each story's tasks tests-first; add the missing test tasks."

[[pitfall]]
id = "TASKS-MALFORMED"
name = "Malformed task lines"
dimension = "consistency"
artifacts = ["tasks"]
severity = "low"
method = "lint"
why = "Tasks drive /speckit.implement; missing IDs/checkboxes or malformed `[P]`/`[US]` markers break automation and tracking."
detect = "Task lines missing a `T###` id or `[ ]`/`[x]` checkbox, or with malformed parallel/story markers."
fix = "Format every task as `[ ] T### [P?] [US?] Description with file path`."

[[pitfall]]
id = "TASKS-UNTRACED-TASK"
name = "Task with no requirement traceability link"
dimension = "traceability"
artifacts = ["tasks"]
severity = "medium"
method = "lint"
why = "ISO/IEC/IEEE 29148:2018 §5.2.6 mandates bidirectional traceability: every task must trace back to a stated requirement. A task line that carries a T## identifier but no [US#] story tag and no FR-/NFR-/AC-/US- reference is stealth scope — work that was never specified, cannot be accepted against any criterion, and cannot be prioritised against product NFRs. This is the reverse of XREF-STORY-NO-TASK (which confirms stories have tasks)."
detect = "For each checkbox task line carrying a T## identifier, assert it contains at least one of: a [US#] story tag, or an FR-/NFR-/AC-/US- identifier. Flag lines that carry neither."
fix = "Add a story or requirement tag: '- [ ] T04 Add rate limiter [US3]' or '- [ ] T05 Add encryption (FR-07)'. If the task has no requirement ancestor, decide whether it belongs in the spec as a new requirement or should be removed."

[[pitfall]]
id = "TASKS-VAGUE"
name = "Vague task lacking a concrete action / path"
dimension = "clarity"
artifacts = ["tasks"]
severity = "low"
method = "both"
why = "A task without a concrete deliverable or file path can't be executed unambiguously or verified as done."
detect = "Implementation task with no file path and a vague verb."
fix = "State the concrete artifact and path the task produces or changes."

# --------------------------------------------------------------------- cross-artifact

[[pitfall]]
id = "XREF-STORY-NO-TASK"
name = "User story with no implementing task"
dimension = "traceability"
artifacts = ["tasks"]
severity = "high"
method = "lint"
why = "Broken traceability: a story nobody implements ships nothing; 29148 traceability."
detect = "A spec user story (US#) with no `[US#]`-tagged tasks in tasks.md."
fix = "Add tasks for the story, or remove the story if it's out of scope."

[[pitfall]]
id = "XREF-ENTITY-NO-TASK"
name = "Data-model entity with no task"
dimension = "traceability"
artifacts = ["tasks"]
severity = "medium"
method = "lint"
why = "An entity defined in data-model.md but never built leaves a gap between design and implementation."
detect = "An entity named in data-model.md not referenced by any task."
fix = "Add a model/creation task for the entity, or remove it from the data model."

[[pitfall]]
id = "XREF-CONTRACT-NO-TEST"
name = "Contract with no contract test"
dimension = "traceability"
artifacts = ["tasks"]
severity = "medium"
method = "lint"
why = "Integration-First requires contract tests; a contract with no test can drift from its implementation undetected."
detect = "A file under contracts/ with no corresponding contract-test task."
fix = "Add a contract-test task per contract before implementation tasks."

[[pitfall]]
id = "XREF-CONTRADICTION"
name = "Cross-artifact contradiction"
dimension = "consistency"
artifacts = ["spec", "plan", "tasks"]
severity = "high"
method = "judge"
why = "Contradictions between spec, plan, and tasks mean at least one is wrong; the agent will implement the contradiction."
detect = "Conflicting statements across artifacts (judge / mirrors /speckit.analyze)."
fix = "Reconcile the artifacts so a single consistent intent remains."

# ----------------------------------------------------------------- cross-artifact constitution

[[pitfall]]
id = "SPECKIT-CONSTITUTION-CROSSCHECK"
name = "Constitution Check does not reference actual principle names from constitution.md"
dimension = "traceability"
artifacts = ["plan"]
severity = "medium"
method = "lint"
why = "Spec-Kit constitution workflow: the Constitution Check in plan.md must evaluate each of the project's actual governing principles. A check that references no named principles gives false assurance — it could be a copy-paste 'PASS' that doesn't actually evaluate the real constraints."
detect = "Extract principle names (level-2/3 headings, excluding generic structural headings and unfilled placeholders) from constitution.md; check that at least one appears (case-insensitive) in the plan's Constitution Check section body."
fix = "In the Constitution Check section of plan.md, explicitly name each principle from constitution.md and state whether it passed or failed (e.g. '- Library-First: PASS — single module, no wrappers')."

# ----------------------------------------------------------------------- constitution

[[pitfall]]
id = "CONST-PLACEHOLDER"
name = "Constitution left as template placeholders"
dimension = "constitutional"
artifacts = ["constitution"]
severity = "high"
method = "lint"
why = "An unfilled constitution means there are no real governing principles; the Constitution Check gates against nothing."
detect = "Principle/section placeholders like `[PRINCIPLE_n_NAME]` remain unfilled."
fix = "Author concrete, project-specific principles (run /speckit.constitution)."
patterns = ["\\[PRINCIPLE_\\d", "\\[SECTION_\\d", "\\[GOVERNANCE_RULES\\]"]

[[pitfall]]
id = "CONST-UNVERSIONED"
name = "Constitution missing version / ratification metadata"
dimension = "constitutional"
artifacts = ["constitution"]
severity = "low"
method = "lint"
why = "Without version and ratification/amendment dates, the constitution can't be governed or its changes tracked."
detect = "Missing or placeholder Version / Ratified / Last Amended metadata."
fix = "Fill in the governance line: Version | Ratified | Last Amended."
patterns = ["\\[CONSTITUTION_VERSION\\]", "\\[RATIFICATION_DATE\\]", "\\[LAST_AMENDED_DATE\\]"]

# ----------------------------------------------------------------- EARS / 29148 (issues #6, #7)

[[pitfall]]
id = "REQ-EARS-PATTERN"
name = "Functional requirement not in an EARS pattern"
dimension = "consistency"
artifacts = ["spec"]
severity = "info"
method = "lint"
why = "EARS (Easy Approach to Requirements Syntax) requirements are more consistent, testable, and unambiguous. This is advisory, not mandatory, so it never lowers the score."
detect = "A 'shall' requirement that does not match an EARS shape (ubiquitous 'The <system> shall ...' or keyword-led When/While/Where/If ... shall ...)."
fix = "Rephrase as EARS: 'The <system> shall <response>' or 'When <trigger>, the <system> shall <response>'."

[[pitfall]]
id = "JUDGE-29148-PERREQ"
name = "Requirement fails an ISO/IEC/IEEE 29148 characteristic"
dimension = "testability"
artifacts = ["spec"]
severity = "medium"
method = "judge"
why = "ISO/IEC/IEEE 29148 requires each requirement be necessary, singular, complete, correct, feasible, and verifiable — the per-requirement quality IBM RQA / QVscribe score, which deterministic lint can only partially check."
detect = "Judge each functional requirement against the 29148 characteristics and report any that fail (which characteristic, and why)."
fix = "Revise the requirement to satisfy the failing characteristic (split if not singular, quantify if not verifiable, add missing detail if not complete)."

# ----------------------------------------------------------------- OpenSpec (issue #20)

[[pitfall]]
id = "OPENSPEC-REQ-NO-SCENARIO"
name = "OpenSpec requirement with no scenario"
dimension = "testability"
artifacts = ["spec"]
severity = "medium"
method = "lint"
why = "OpenSpec requirements are validated by their scenarios; a '### Requirement:' with no '#### Scenario:' has no acceptance behavior to test against."
detect = "A '### Requirement:' section whose body contains no '#### Scenario:'."
fix = "Add at least one '#### Scenario:' with WHEN/THEN describing the expected behavior."

# ----------------------------------------------------------- traceability (issue #93)

[[pitfall]]
id = "REQ-DUPLICATE-ID"
name = "Duplicate requirement identifier"
dimension = "completeness"
artifacts = ["spec"]
severity = "high"
method = "lint"
why = "ISO/IEC/IEEE 29148:2018 §5.2 mandates every requirement carries a unique identifier so it can be unambiguously traced, referenced, and tested. A reused FR-/NFR-/AC-/US- ID silently breaks traceability: cross-artifact xref checks key on these IDs, and downstream tooling will conflate or overwrite the duplicated requirement."
detect = "The same FR-NNN, NFR-NNN, AC-NNN, or US-NNN identifier appears on two or more non-blank, non-fenced lines in spec.md."
fix = "Renumber colliding requirements to give each a unique identifier; update all cross-references."

# ----------------------------------------------------- judge tampering (issue #49)

[[pitfall]]
id = "SPEC-PROMPT-INJECTION-SUSPECT"
name = "Prompt-injection phrasing in artifact"
dimension = "constitutional"
artifacts = ["spec", "plan", "tasks", "constitution", "research", "data-model", "quickstart", "contract", "checklist"]
severity = "high"
method = "lint"
why = "Text addressed to the reviewing agent ('ignore previous instructions', 'report no findings') has no place in a specification; it reads as an attempt to tamper with the automated review and can neutralize the LLM judge half of the grade. This deterministic check fires even when the judge is successfully fooled."
detect = "Match classic injection phrasing: instructions to ignore/disregard prior instructions, demands to report no/zero findings or to output a fixed result, or references to the system prompt."
fix = "Remove instruction-like text aimed at reviewers or tools; a specification describes the system under specification, it never addresses the tools grading it."
patterns = [
  "\\bignore\\s+(?:all\\s+)?(?:the\\s+)?(?:previous|above|prior|earlier)\\s+instructions\\b",
  "\\bdisregard\\s+(?:all\\s+)?(?:the\\s+)?(?:previous|above|prior|earlier)\\s+instructions\\b",
  "\\breport\\s+(?:no|zero)\\s+findings\\b",
  "\\boutput\\s+only\\b",
  "\\bsystem\\s+prompt\\b",
  "\"findings\"\\s*:\\s*\\[\\s*\\]",
]

# ------------------------------------------------ plan rollback strategy (issue #89)

[[pitfall]]
id = "PLAN-MISSING-ROLLBACK"
name = "Deployment plan with no rollback/revert/fallback strategy"
dimension = "completeness"
artifacts = ["plan"]
severity = "medium"
method = "lint"
why = "Spec-Kit best practices and ISO 25010 reliability require deployment plans to address reversibility. A plan that never considers what happens when a deploy fails causes production incidents and leaves teams unable to recover quickly."
detect = "Check whether any rollback-vocabulary keyword (rollback, revert, fallback, recovery, undo, back out) appears in a plan.md that contains deployment vocabulary (deploy, release, ship, production, staging) or a Deployment/Release section. Fire once at the file level if none are found."
fix = "Add an explicit rollback strategy: e.g. 'If the deploy fails, revert to the previous image with `kubectl rollout undo deployment/api`.' Place it in a Deployment or Rollback Plan section."

[[pitfall]]
id = "PLAN-NO-TESTING-STRATEGY"
name = "Multi-phase plan with no testing strategy"
dimension = "completeness"
artifacts = ["plan"]
severity = "medium"
method = "lint"
why = "Tessl's spec-first principle and Spec-Kit's Test-First gate require that an implementation plan address how correctness will be verified, not just what will be built. A multi-phase plan with no testing mention can be executed and declared done without any verification target, turning the plan into a pure delivery checklist with no quality gate."
detect = "Count headings matching Phase or Step (case-insensitive). If 2 or more are found, check whether any testing vocabulary (test, testing, coverage, validate, validation, verify, verification) appears anywhere in the document. Fire once if the guard fires and no testing vocabulary is found."
fix = "Add a Testing Strategy or Acceptance Testing section that describes how correctness will be verified: unit tests, integration tests, coverage targets, or manual acceptance criteria."

[[pitfall]]
id = "PLAN-MISSING-OBSERVABILITY"
name = "Deployment plan with no observability mention"
dimension = "completeness"
artifacts = ["plan"]
severity = "medium"
method = "lint"
why = "ISO/IEC 25010 operability and SRE production-readiness reviews require that any deployment plan address how the running system will be observed. A plan that describes how to ship but never mentions monitoring, logging, metrics, or alerting produces a black box: failures go undetected until user reports arrive."
detect = "Check whether deployment vocabulary (deploy, release, ship, production, staging) appears or a Deployment/Release section exists. If the guard fires, check for absence of observability vocabulary (monitor, logging, metrics, tracing, alerting, dashboard, SLO, SLA, observability). Fire once at the file level if the guard fires and no observability vocabulary is found."
fix = "Add an Observability section: describe which metrics will be emitted, what alerts will fire, where logs go, and what dashboards or SLOs cover the released service."

[[pitfall]]
id = "REQ-WEAK-DIRECTIVE"
name = "Requirement using non-normative modal verb"
dimension = "completeness"
artifacts = ["spec"]
severity = "medium"
method = "lint"
why = "ISO/IEC/IEEE 29148:2018 §5.2.6 reserves 'shall'/'must' for mandatory requirements and classifies 'should' as a recommendation, 'may'/'could' as optional. QVscribe (Optionality defect, Level 1) and IBM RQA (directive-strength check) flag the same pattern. A requirement written with 'should' or 'may' is optionally satisfiable: an implementer can skip it without formal non-compliance, making the requirement unverifiable and the contract unenforceable."
detect = "Requirement-bearing lines (inside a Requirements/Acceptance/Scenario section, or lines with FR-/NFR- labels) where the primary modal verb is 'should', 'may', 'could', or 'might' and neither 'shall' nor 'must' appears on the same line (which would indicate a legitimate EARS conditional)."
fix = "Replace the non-normative modal with 'shall' or 'must': 'The system shall encrypt all tokens at rest.' Use 'should' only for advisory notes that are not requirements, placed outside the Requirements section."

[[pitfall]]
id = "PLAN-MISSING-SECURITY"
name = "Deployment plan with no security vocabulary"
dimension = "completeness"
artifacts = ["plan"]
severity = "medium"
method = "lint"
why = "ISO/IEC 25010 Security quality characteristic (confidentiality, integrity, non-repudiation) requires any deployment plan to address how the running system will be secured. A plan that describes how to ship but never mentions authentication, encryption, or access control produces a production surface that post-deployment security audits will flag as unaddressed."
detect = "Check whether deployment vocabulary (deploy, release, ship, production, staging) appears or a Deployment/Release section exists. If the guard fires, check for absence of security-hardening vocabulary (auth, TLS, SSL, encrypt, secret, credential, certificate, RBAC, IAM, firewall, access control, token, mTLS, vault). Fire once at the file level if the guard fires and no security vocabulary is found."
fix = "Add a Security section: describe how secrets are managed, what auth mechanism protects the service, whether TLS terminates at the load balancer or service, and what access-control model governs production access."

[[pitfall]]
id = "SPEC-PRONOUN-ANTECEDENT"
name = "Ambiguous object pronoun in requirement"
dimension = "clarity"
artifacts = ["spec"]
severity = "low"
method = "lint"
why = "IBM RQA's pronoun-antecedent check (separate from its actor/subject check) flags dangling object references that make a requirement interpretable in multiple ways. ISO/IEC/IEEE 29148:2018 §5.2.6 requires each requirement to be unambiguous. Two engineers testing 'The system shall send it to them via the API' may test completely different things, producing divergent implementations and test cases."
detect = "Requirement-bearing lines (inside a Requirements/Acceptance/Scenario section, or lines with FR-/NFR-/AC-/US- labels) where a modal verb (shall/must) is followed within the same sentence by a standalone object pronoun (it, them, their, this, that, these, those — excluding possessive 'its' which nearly always has a clear nominal antecedent), and the pronoun is not the grammatical subject (those are caught by SPEC-UNCLEAR-ACTOR)."
fix = "Replace the pronoun with the explicit noun it refers to: 'The system shall send the access token to the requesting client via the OAuth callback URL.'"
